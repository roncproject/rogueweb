# ─────────────────────────────────────────────────────────────────
# Rogue AWS – Spring Boot application configuration
# ─────────────────────────────────────────────────────────────────

# Port: override with the PORT environment variable (App Runner / ECS
# both set this automatically; default 8080 for local development).
server.port=${PORT:8080}

# Bind to all interfaces so AWS can route traffic to the container.
# Local development stays on localhost automatically.
server.address=0.0.0.0

# ── Session ──────────────────────────────────────────────────────
# Keep game sessions alive for 30 minutes of inactivity.
server.servlet.session.timeout=30m

# ── Actuator health endpoint (used by ALB / App Runner health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.defaults.enabled=true

# ── Logging ──────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.rogue=INFO

# Application info (appears at /actuator/info)
info.app.name=Rogue – Dungeons of Doom
info.app.version=1.0
